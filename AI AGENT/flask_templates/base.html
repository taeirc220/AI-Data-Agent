<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Data Department{% endblock %}</title>
  <!-- Load saved theme before paint to avoid flash -->
  <script>
    (function(){
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root,
    [data-theme="dark"] {
      --bg:           #000000;
      --sidebar-bg:   #0a0a0a;
      --card:         rgba(240,240,250,0.05);
      --card-border:  rgba(240,240,250,0.10);
      --accent:       #78a0ff;
      --accent-dim:   rgba(120,160,255,0.18);
      --accent-glow:  rgba(120,160,255,0.08);
      --text:         rgba(240,240,250,0.85);
      --text-muted:   rgba(240,240,250,0.38);
      --text-dim:     rgba(240,240,250,0.18);
      --border:       rgba(240,240,250,0.10);
      --border-dim:   rgba(240,240,250,0.05);
      --green:        #4ade80;
      --red:          #f87171;
      --orange:       #fb923c;
      --sidebar-w:    220px;
    }

    [data-theme="light"] {
      --bg:           #e8eaf2;
      --sidebar-bg:   #f2f3fb;
      --card:         #f7f8fd;
      --card-border:  rgba(10,12,30,0.08);
      --accent:       #5b7fff;
      --accent-dim:   rgba(91,127,255,0.18);
      --accent-glow:  rgba(91,127,255,0.07);
      --text:         rgba(10,12,30,0.88);
      --text-muted:   rgba(10,12,30,0.44);
      --text-dim:     rgba(10,12,30,0.22);
      --border:       rgba(10,12,30,0.09);
      --border-dim:   rgba(10,12,30,0.05);
      --green:        #16a34a;
      --red:          #dc2626;
      --orange:       #ea580c;
      --sidebar-w:    220px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 22px 18px 18px;
      border-bottom: 1px solid var(--border-dim);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .brand-icon {
      width: 34px; height: 34px;
      flex-shrink: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    /* Orbital ring logo */
    .brand-icon svg { width: 34px; height: 34px; }
    .brand-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .sidebar-section {
      padding: 18px 10px 6px;
    }
    .sidebar-section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 8px 8px 12px;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 1px;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: var(--card); }
    .nav-item.active {
      color: var(--accent);
      background: var(--accent-glow);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 18px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .nav-icon { width: 16px; text-align: center; font-size: 14px; flex-shrink: 0; opacity: 0.8; }
    .nav-item.active .nav-icon { opacity: 1; }

    /* Agent roster */
    .agent-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11.5px;
      transition: all 0.15s;
      margin-bottom: 1px;
    }
    .agent-row:hover { background: var(--card); color: var(--text); }
    .agent-ava {
      width: 26px; height: 26px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .agent-ava img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; }
    .agent-name { font-weight: 600; font-size: 11.5px; color: var(--text-muted); }
    .agent-role { font-size: 9.5px; color: var(--text-dim); }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px 10px;
      border-top: 1px solid var(--border-dim);
    }
    .user-panel {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .user-ava {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .user-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .btn-logout {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ── Main content ── */
    .main-content {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 28px 32px;
      min-height: 100vh;
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 24px; }
    .page-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .page-header p { font-size: 12px; color: var(--text-muted); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
    }

    /* ── KPI cards ── */
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 18px;
    }
    .kpi-card-icon {
      width: 36px; height: 36px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      margin-bottom: 12px;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1;
    }
    .kpi-sub { font-size: 11px; color: var(--text-muted); }
    .kpi-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-up   { background: rgba(74,222,128,0.12); color: var(--green); }
    .badge-down { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge-flat { background: rgba(240,240,250,0.06); color: var(--text-muted); }
    [data-theme="light"] .badge-up   { background: rgba(22,163,74,0.10); }
    [data-theme="light"] .badge-down { background: rgba(220,38,38,0.10); }
    [data-theme="light"] .badge-flat { background: rgba(10,12,30,0.06); }
    [data-theme="light"] .alert-error {
      background: rgba(220,38,38,0.06);
      border-color: rgba(220,38,38,0.18);
    }

    /* ── Chart panels ── */
    .chart-panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 18px;
    }

    /* ── Grid helpers ── */
    .grid-4   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .grid-3   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .grid-2   { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .grid-5-3 { display: grid; grid-template-columns: 5fr 3fr; gap: 14px; }
    .grid-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-sm { width: 14px; height: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 40px;
      color: var(--text-muted); font-size: 12px;
    }

    .alert-error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 4px;
      color: var(--red);
      padding: 10px 14px;
      font-size: 12px;
    }

    hr { border: none; border-top: 1px solid var(--border-dim); }

    /* ── Page-enter fade ── */
    #page-enter {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 1;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #page-enter.done { opacity: 0; }

    /* ── Theme toggle ── */
    #app-theme-toggle {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    #app-theme-toggle:hover {
      background: var(--accent-glow);
      border-color: var(--accent-dim);
      transform: translateY(-50%) scale(1.1);
    }
    #app-theme-toggle svg { pointer-events: none; }
    @media (max-width: 640px) { #app-theme-toggle { right: 10px; } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div id="page-enter"></div>

<button id="app-theme-toggle" aria-label="Toggle theme" title="Toggle light / dark"></button>

<aside class="sidebar">
  <div class="sidebar-logo">
    <a class="brand" href="{{ url_for('dashboard.main') }}">
      <div class="brand-icon">
        <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="17" cy="17" r="12" stroke="rgba(120,160,255,0.4)" stroke-width="1.2"/>
          <ellipse cx="17" cy="17" rx="12" ry="5" stroke="rgba(120,160,255,0.2)" stroke-width="1"/>
          <circle cx="17" cy="5" r="2.5" fill="#78a0ff"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Orbital AI</div>
        <div class="brand-sub">Data Agent</div>
      </div>
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Menu</div>
    <a class="nav-item {% if request.endpoint == 'dashboard.main' %}active{% endif %}"
       href="{{ url_for('dashboard.main') }}">
      <span class="nav-icon">▣</span> Dashboard
    </a>
    <a class="nav-item {% if request.endpoint == 'chat.chat' %}active{% endif %}"
       href="{{ url_for('chat.chat') }}">
      <span class="nav-icon">◈</span> AI Chat
    </a>
    <a class="nav-item {% if request.endpoint == 'prediction.prediction' %}active{% endif %}"
       href="{{ url_for('prediction.prediction') }}">
      <span class="nav-icon">◎</span> Prediction
    </a>
    <a class="nav-item {% if request.endpoint == 'consultant.consultant' %}active{% endif %}"
       href="{{ url_for('consultant.consultant') }}">
      <span class="nav-icon">⚡</span> Consultant
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Agents</div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/alex.png') }}" alt="Idan"></div>
      <div><div class="agent-name">Idan</div><div class="agent-role">Sales Agent</div></div>
    </div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/dana.png') }}" alt="Dana"></div>
      <div><div class="agent-name">Dana</div><div class="agent-role">Product Agent</div></div>
    </div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/maya.png') }}" alt="Maya"></div>
      <div><div class="agent-name">Maya</div><div class="agent-role">Customer Agent</div></div>
    </div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/rey.png') }}" alt="Rey"></div>
      <div><div class="agent-name">Rey</div><div class="agent-role">Prediction Agent</div></div>
    </div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/aria.png') }}" alt="Aria"></div>
      <div><div class="agent-name">Aria</div><div class="agent-role">General Agent</div></div>
    </div>
    <div class="agent-row">
      <div class="agent-ava"><img src="{{ url_for('static', filename='avatars/zyon.png') }}" alt="Zyon"></div>
      <div><div class="agent-name">Zyon</div><div class="agent-role">Consultant</div></div>
    </div>
  </div>

</aside>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}

<script>
  /* ── App theme engine ── */
  (function () {
    const root = document.documentElement;
    const btn  = document.getElementById('app-theme-toggle');

    const ICONS = {
      dark:  /* moon */
        `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>`,
      light: /* sun */
        `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>  <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>`,
    };

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      btn.innerHTML = ICONS[theme];
      if (window._dashboardSetTheme) window._dashboardSetTheme(theme);
    }

    btn.addEventListener('click', function () {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    applyTheme(root.getAttribute('data-theme') || 'dark');
  })();

  /* ── Page-enter fade-in ── */
  (function () {
    const el = document.getElementById('page-enter');
    if (!el) return;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        el.classList.add('done');
      });
    });
  })();
</script>
</body>
</html>
