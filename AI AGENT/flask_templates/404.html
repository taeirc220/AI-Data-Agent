{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:60vh;text-align:center;">
  <div style="font-size:64px;margin-bottom:16px;">🔍</div>
  <h1 style="font-size:28px;font-weight:700;color:#f0f6fc;margin-bottom:8px;">Page Not Found</h1>
  <p style="color:#8b949e;font-size:14px;margin-bottom:28px;">The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('dashboard.main') }}"
     style="background:#1f6feb;color:#fff;border:none;border-radius:8px;padding:10px 24px;
            font-size:14px;font-weight:600;text-decoration:none;">← Back to Dashboard</a>
</div>
{% endblock %}
