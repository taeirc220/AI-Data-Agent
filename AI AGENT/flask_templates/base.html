<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Data Department{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    :root {
      --bg-base:    #0d1117;
      --bg-card:    #161b22;
      --bg-card2:   #1c2128;
      --border:     #21262d;
      --border2:    #30363d;
      --text-pri:   #f0f6fc;
      --text-sec:   #8b949e;
      --blue:       #1f6feb;
      --blue-dim:   rgba(31,111,235,0.12);
      --green:      #3fb950;
      --purple:     #8b5cf6;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-pri);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--bg-card) !important;
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand {
      color: var(--text-pri) !important;
      font-weight: 700;
      font-size: 16px;
    }
    .navbar-brand span {
      color: var(--blue);
    }
    .nav-link {
      color: var(--text-sec) !important;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px !important;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text-pri) !important;
      background: var(--border) !important;
    }
    .nav-link.active {
      border-bottom: 2px solid var(--blue);
      border-radius: 0;
    }
    .nav-user {
      color: var(--text-sec);
      font-size: 13px;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-sec);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-logout:hover {
      border-color: #f85149;
      color: #f85149;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border2);
      border-radius: 12px;
    }

    /* ── KPI cards ── */
    .kpi-card {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card2));
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .kpi-label {
      color: var(--text-sec);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .kpi-value {
      color: var(--text-pri);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .kpi-sub {
      color: var(--text-sec);
      font-size: 11px;
    }

    /* ── Chart panels ── */
    .chart-panel {
      background: var(--bg-card);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 16px;
    }

    /* ── Page header ── */
    .page-header {
      background: linear-gradient(135deg, var(--bg-base), var(--bg-card) 60%, var(--bg-card2));
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 22px 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--purple) 50%, var(--green) 100%);
    }
    .page-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-pri);
      margin: 0 0 4px 0;
    }
    .page-header p {
      color: var(--text-sec);
      font-size: 12px;
      margin: 0;
    }

    /* ── Loading spinner ── */
    .spinner-border {
      border-color: var(--blue);
      border-right-color: transparent;
    }

    hr { border-color: var(--border) !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if session.get('username') %}
<nav class="navbar navbar-expand-md px-4 py-2">
  <a class="navbar-brand" href="{{ url_for('dashboard.main') }}">
    📊 <span>AI</span> Data Dept.
  </a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav me-auto ms-3 gap-1">
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'dashboard.main' %}active{% endif %}"
           href="{{ url_for('dashboard.main') }}">📈 Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'chat.chat' %}active{% endif %}"
           href="{{ url_for('chat.chat') }}">💬 AI Chat</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'prediction.prediction' %}active{% endif %}"
           href="{{ url_for('prediction.prediction') }}">🔮 Prediction</a>
      </li>
    </ul>
    <div class="d-flex align-items-center gap-3">
      <span class="nav-user">👤 {{ session.get('username') }}</span>
      <a href="{{ url_for('auth.logout') }}">
        <button class="btn-logout">Logout</button>
      </a>
    </div>
  </div>
</nav>
{% endif %}

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
